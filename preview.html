<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ecommerco.ai - Imperial Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            min-height: 100vh;
            color: white;
        }
        
        /* Header */
        .header {
            background: #000000;
            padding: 50px 20px 20px;
            color: white;
            border-bottom: 1px solid #1A1A1A;
        }
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-box {
            width: 44px;
            height: 44px;
            background: #FFD400;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            color: black;
        }
        .brand-text h1 {
            font-size: 20px;
            font-weight: 900;
            color: #FFD400;
            letter-spacing: 1px;
        }
        .brand-text p {
            font-size: 12px;
            opacity: 0.8;
            letter-spacing: 2px;
        }
        
        /* Hero */
        .hero {
            background: #0A0A0A;
            margin: 20px;
            border-radius: 24px;
            padding: 28px;
            color: white;
            border: 1px solid #1A1A1A;
        }
        .hero h2 {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 8px;
        }
        .hero p {
            font-size: 14px;
            opacity: 0.85;
        }
        
        /* Search */
        .search-bar {
            background: #0A0A0A;
            margin: 0 20px 20px;
            padding: 16px 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #27272A;
        }
        .search-icon { font-size: 18px; }
        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 16px;
            outline: none;
            color: white;
        }
        
        /* Section */
        .section {
            padding: 20px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 900;
            color: #FFFFFF;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-box">E</div>
                <div class="brand-text">
                    <h1>ECOMMERCO</h1>
                    <p>.AI</p>
                </div>
            </div>
        </div>
    </div>

    <div class="hero">
        <h2>Establishing Imperial Connection</h2>
        <p>Real-time price brokerage activated.</p>
    </div>

    <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" placeholder="Search destinations..." readonly>
    </div>

    <div class="section">
        <div class="section-header">
            <h3 class="section-title">FEATURED DESTINATIONS</h3>
        </div>
    </div>
</body>
</html>
